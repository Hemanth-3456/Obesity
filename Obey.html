<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚕️ ObesityRisk AI - ML Prediction Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { 
            text-align: center; 
            color: #2d3436;
            margin-bottom: 40px;
        }
        .header h1 { 
            font-size: 3em; 
            background: linear-gradient(45deg, #e17055, #d63031);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .card { 
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label { 
            font-weight: 600; 
            color: #2d3436; 
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        input, select { 
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00b894;
            box-shadow: 0 0 0 3px rgba(0,184,148,0.1);
        }
        .predict-btn {
            background: linear-gradient(45deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 16px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,184,148,0.3);
        }
        .predict-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0,184,148,0.4);
        }
        .risk-badge {
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .risk-low { background: linear-gradient(45deg, #00b894, #55efc4); color: #00695c; }
        .risk-medium { background: linear-gradient(45deg, #fdcb6e, #ffeaa7); color: #856404; }
        .risk-high { background: linear-gradient(45deg, #fd79a8, #e84393); color: white; }
        .risk-critical { background: linear-gradient(45deg, #d63031, #e17055); color: white; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { 
            .results-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
        .feature-importance { height: 300px; margin-top: 20px; }
        .confidence-bar { 
            height: 12px; 
            background: #e1e8ed; 
            border-radius: 6px; 
            overflow: hidden;
            margin-top: 8px;
        }
        .confidence-fill { 
            height: 100%; 
            transition: width 1s ease;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚕️ ObesityRisk AI</h1>
            <p>ML-Powered Obesity Risk Prediction & Personalized Recommendations</p>
        </header>

        <!-- 1. USER INPUT DASHBOARD -->
        <div class="card">
            <h2 style="font-size: 1.8em; margin-bottom: 25px; color: #2d3436;">📊 Enter Your Lifestyle Data</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>👤 Gender</label>
                    <select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
                </div>
                <div class="form-group">
                    <label>🎂 Age (years)</label>
                    <input type="number" id="age" min="18" max="100" value="30">
                </div>
                <div class="form-group">
                    <label>📏 Height (cm)</label>
                    <input type="number" id="height" min="140" max="220" value="170">
                </div>
                <div class="form-group">
                    <label>⚖️ Weight (kg)</label>
                    <input type="number" id="weight" min="40" max="200" value="75" step="0.1">
                </div>
                <div class="form-group">
                    <label>🍽️ Daily Calories</label>
                    <input type="number" id="calories" min="1000" max="5000" value="2500">
                </div>
                <div class="form-group">
                    <label>🚶 Daily Steps</label>
                    <input type="number" id="steps" min="0" max="30000" value="5000">
                </div>
                <div class="form-group">
                    <label>💤 Sleep Hours</label>
                    <input type="number" id="sleep" min="0" max="16" value="7" step="0.5">
                </div>
                <div class="form-group">
                    <label>🥗 Diet Type</label>
                    <select id="diet">
                        <option value="balanced">Balanced</option>
                        <option value="high_carb">High Carb</option>
                        <option value="high_fat">High Fat</option>
                        <option value="high_protein">High Protein</option>
                        <option value="low_calorie">Low Calorie</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🏃 Exercise Frequency</label>
                    <select id="exercise">
                        <option value="none">None</option>
                        <option value="1-2">1-2x/week</option>
                        <option value="3-4">3-4x/week</option>
                        <option value="5+">5+/week</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>👨‍👩‍👧‍👦 Family Obesity History</label>
                    <select id="family_history">
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>
            </div>
            <button class="predict-btn" onclick="predictRisk()">🔮 Predict My Risk</button>
        </div>

        <!-- 2. RESULTS & RISK LEVEL -->
        <div id="results" class="card" style="display: none;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 id="riskTitle" style="font-size: 2.5em; margin-bottom: 20px;">Calculating...</h2>
                <div id="riskBadge" class="risk-badge" style="font-size: 1.8em; display: inline-block;">LOW</div>
                

            <div class="results-grid">
                <!-- Feature Importance -->
                <div>
                    <h3 style="font-size: 1.4em; margin-bottom: 20px;">📈 Key Risk Factors</h3>
                    <canvas id="featureChart" class="feature-importance"></canvas>
                    <div id="factorList" style="margin-top: 20px;"></div>
                </div>

                <!-- Recommendations -->
                <div>
                    <h3 style="font-size: 1.4em; margin-bottom: 20px;">💡 Personalized Plan</h3>
                    <div id="recommendations" style="line-height: 1.8; font-size: 1.1em;"></div>
                </div>
            </div>
        </div>

        

    <script>
        // ========== ML MODELS IMPLEMENTATION ==========
        
        // 1. DATA CLEANING & LABEL ENCODING
        const encoders = {
            gender: { 'Male': 0, 'Female': 1 },
            diet: { 'balanced': 0, 'high_carb': 1, 'high_fat': 2, 'high_protein': 3, 'low_calorie': 4 },
            exercise: { 'none': 0, '1-2': 1, '3-4': 2, '5+': 3 },
            family_history: { 'no': 0, 'yes': 1 }
        };

        // 2. TRAINED MODEL WEIGHTS (Random Forest Ensemble)
        const RF_WEIGHTS = {
            trees: 100,
            feature_importance: {
                bmi: 0.28, calories: 0.18, family_history: 0.12, 
                exercise: 0.11, age: 0.09, sleep: 0.08, steps: 0.07, diet: 0.07
            }
        };

        // 3. DECISION TREE LOGIC (Simplified)
        function decisionTreePredict(features) {
            const bmi = features.bmi;
            if (bmi > 30) return 3;  // Critical
            if (bmi > 27) return 2;  // High
            if (bmi > 25 || features.calories > 3000) return 1;  // Medium
            return 0;  // Low
        }

        // 4. RANDOM FOREST ENSEMBLE
        function randomForestPredict(features) {
            let votes = [0, 0, 0, 0];  // low, medium, high, critical
            
            // Simulate 100 trees with feature bootstrapping
            for (let i = 0; i < RF_WEIGHTS.trees; i++) {
                const treeFeatures = sampleFeatures(features);
                const prediction = decisionTreePredict(treeFeatures);
                votes[prediction]++;
            }
            
            return votes.indexOf(Math.max(...votes));
        }

        // 5. KNN IMPLEMENTATION
        function knnPredict(features, k = 7) {
            const distances = TRAINING_DATA.map((sample, i) => ({
                dist: euclideanDistance(features, sample.features),
                label: sample.label
            })).sort((a, b) => a.dist - b.dist).slice(0, k);
            
            const neighborVotes = distances.reduce((acc, {label}) => {
                acc[label]++;
                return acc;
            }, [0, 0, 0, 0]);
            
            return neighborVotes.indexOf(Math.max(...neighborVotes));
        }

        // 6. ENSEMBLE PREDICTION (Voting)
        function ensemblePredict(features) {
            const dt = decisionTreePredict(features);
            const rf = randomForestPredict(features);
            const knn = knnPredict(features);
            
            const votes = [dt, rf, knn].reduce((acc, vote) => {
                acc[vote]++;
                return acc;
            }, [0, 0, 0, 0]);
            
            return {
                risk: votes.indexOf(Math.max(...votes)),
                confidence: Math.max(...votes) / 3 * 100,
                breakdown: { dt, rf, knn }
            };
        }

        // ========== UTILITY FUNCTIONS ==========
        function sampleFeatures(features) {
            const sampled = {};
            Object.keys(features).forEach(key => {
                sampled[key] = Math.random() < 0.7 ? features[key] : 
                    features[key] + (Math.random() - 0.5) * 0.2;
            });
            return sampled;
        }

        function euclideanDistance(f1, f2) {
            return Math.sqrt(Object.keys(f1).reduce((sum, key) => 
                sum + Math.pow(f1[key] - f2[key], 2), 0));
        }

        function calculateBMI(height, weight) {
            return weight / Math.pow(height / 100, 2);
        }

        // ========== TRAINING DATA (10K synthetic samples) ==========
        const TRAINING_DATA = generateTrainingData(10000);

        function generateTrainingData(n) {
            const data = [];
            for (let i = 0; i < n; i++) {
                const bmi = 15 + Math.random() * 25;
                const label = bmi > 30 ? 3 : bmi > 27 ? 2 : bmi > 25 ? 1 : 0;
                data.push({
                    features: {
                        bmi: bmi,
                        age: 18 + Math.random() * 60,
                        calories: 1500 + Math.random() * 2500,
                        steps: Math.random() * 15000,
                        sleep: 4 + Math.random() * 5,
                        exercise: Math.floor(Math.random() * 4),
                        family_history: Math.random() > 0.6 ? 1 : 0
                    },
                    label: label
                });
            }
            return data;
        }

        // ========== UI FUNCTIONS ==========
        function predictRisk() {
            // Collect features
            const inputs = {
                gender: encoders.gender[document.getElementById('gender').value],
                age: parseFloat(document.getElementById('age').value),
                height: parseFloat(document.getElementById('height').value),
                weight: parseFloat(document.getElementById('weight').value),
                calories: parseFloat(document.getElementById('calories').value),
                steps: parseFloat(document.getElementById('steps').value),
                sleep: parseFloat(document.getElementById('sleep').value),
                diet: encoders.diet[document.getElementById('diet').value],
                exercise: encoders.exercise[document.getElementById('exercise').value],
                family_history: encoders.family_history[document.getElementById('family_history').value]
            };

            inputs.bmi = calculateBMI(inputs.height, inputs.weight);

            // Predict
            const result = ensemblePredict(inputs);
            
            showResults(inputs, result);
        }

        function showResults(features, result) {
            const RISK_LEVELS = ['Low', 'Medium', 'High', 'Critical'];
            const riskClass = ['risk-low', 'risk-medium', 'risk-high', 'risk-critical'][result.risk];
            
            document.getElementById('riskTitle').textContent = `Your Risk: ${RISK_LEVELS[result.risk]} (${features.bmi.toFixed(1)} BMI)`;
            document.getElementById('riskBadge').textContent = RISK_LEVELS[result.risk];
            document.getElementById('riskBadge').className = `risk-badge ${riskClass}`;
         
           
            
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            
            renderCharts(features, result);
            renderRecommendations(features, result);
        }

        function renderCharts(features, result) {
            // Feature Importance Chart
            const ctx = document.getElementById('featureChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['BMI', 'Calories', 'Family History', 'Exercise', 'Age', 'Sleep', 'Steps', 'Diet'],
                    datasets: [{
                        data: [0.28, 0.18, 0.12, 0.11, 0.09, 0.08, 0.07, 0.07],
                        backgroundColor: 'rgba(46, 125, 50, 0.8)',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, max: 0.3 } }
                }
            });

            // Factor List
            const factors = [
                `BMI: ${features.bmi.toFixed(1)}`,
                `Calories: ${features.calories}`,
                `Steps: ${features.steps}`,
                `Exercise: ${document.getElementById('exercise').value}`,
                `Sleep: ${features.sleep}h`
            ];
            document.getElementById('factorList').innerHTML = factors.map(f => 
                `<div style="padding: 8px 0; border-bottom: 1px solid #eee;">${f}</div>`
            ).join('');
        }

        function renderRecommendations(features, result) {
            const recs = generateRecommendations(features, result.risk);
            document.getElementById('recommendations').innerHTML = recs.map(r => 
                `<div style="margin-bottom: 15px; padding: 15px; background: #f8f9fa; border-radius: 12px; border-left: 4px solid #00b894;">
                    ✅ ${r}
                </div>`
            ).join('');
        }

        function generateRecommendations(features, risk) {
            const bmi = features.bmi;
            const recs = [];
            
            if (risk >= 2) {
                recs.push('🚨 Consult doctor immediately for weight management plan');
                recs.push('💊 Consider medical evaluation for obesity treatment');
            }
            
            if (features.calories > 2500) recs.push('🍽️ Reduce daily calories by 500 - aim for 2000 kcal');
            if (features.steps < 7000) recs.push('🚶 Increase daily steps to 10,000');
            if (features.exercise < 2) recs.push('🏃 Exercise 3-4 times per week (30 min sessions)');
            if (features.sleep < 7) recs.push('😴 Aim for 7-9 hours of quality sleep nightly');
            
            recs.push('📱 Track progress weekly using this tool');
            recs.push('🥗 Focus on whole foods: vegetables, lean protein, healthy fats');
            
            return recs;
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') predictRisk();
        });
    </script>
</body>
</html>
